<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img [src]="'assets/images/logo.svg'" alt="Moments Studio Logo" class="admin-logo">
      <h2>Admin Portal</h2>
      <p>Please enter your credentials to continue</p>
    </div>

    <form (submit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" name="username" [(ngModel)]="loginData.username" placeholder="Enter username" required>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" [(ngModel)]="loginData.password" placeholder="Enter password" required>
        </div>
      </div>

      <button type="submit" class="btn-login">Login to Dashboard</button>
    </form>

    <div class="login-footer">
      <p>&copy; 2026 Moments Studio. All Rights Reserved.</p>
    </div>
  </div>
</div>
