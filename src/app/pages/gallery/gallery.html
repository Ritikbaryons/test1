<section class="gallery-header section-padding" style="padding-top: 150px;">
  <div class="container text-center">
    <h4 class="gold-text">{{pageSubtitle}}</h4>
    <h2>{{pageTitle}}</h2>
  </div>
</section>

<section class="gallery-grid section-padding">
  <div class="container">

    <!-- Loading State -->
    <div *ngIf="isLoading" class="text-center py-5">
      <p class="gold-text">Fetching your cinematic moments...</p>
      <div class="spinner-border text-gold" role="status"></div>
    </div>

    <!-- Gallery Grid (Only show when not loading and has images) -->
    <div class="masonry" *ngIf="!isLoading && images.length > 0">
      <div class="gallery-item" *ngFor="let img of images; let i = index" 
           [style.--i]="i" 
           [style.--tx]="img.tx" 
           [style.--ty]="img.ty" 
           [style.--tr]="img.tr">
        <div class="gallery-img-wrap">
          <img [src]="img.url" [alt]="img.category">
          <div class="gallery-overlay">
            <div class="overlay-info">
              <span class="category">{{img.category}}</span>
              <p class="location"><i class="fas fa-map-marker-alt"></i> {{img.location}}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State (Only show when not loading and no images) -->
    <div *ngIf="!isLoading && images.length === 0" class="text-center py-5">
      <p>No moments found yet. Our lens is ready for your story!</p>
    </div>

  </div>
</section>
