<section class="films-header section-padding" style="padding-top: 150px;">
  <div class="container text-center">
    <h4 class="gold-text">{{pageSubtitle}}</h4>
    <h2>{{pageTitle}}</h2>
  </div>
</section>

<section class="films-grid section-padding">
  <div class="container">
    <div class="video-grid">
      <div class="video-item" *ngFor="let video of videos">
        <iframe [src]="video | safeUrl" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>
</section>
