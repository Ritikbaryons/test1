<section class="films-header section-padding" style="padding-top: 150px;">
  <div class="container text-center">
    <h4 class="gold-text">{{pageSubtitle}}</h4>
    <h2>{{pageTitle}}</h2>
  </div>
</section><section class="films-content section-padding" *ngIf="videos.length > 0">
  <div class="container">
    <!-- Main Video -->
    <div class="main-video-wrapper">
      <div class="video-container main-video">
        <iframe [src]="getSafeUrl(mainVideo.url)" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="video-info">
        <h3>{{mainVideo.title}}</h3>
      </div>
    </div>

    <!-- Video Grid -->
    <div class="video-grid">
      <div class="video-card" *ngFor="let video of otherVideos">
        <div class="video-container">
          <iframe [src]="getSafeUrl(video.url)" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="video-info">
          <h4>{{video.title}}</h4>
        </div>
      </div>
    </div>
  </div>
</section>
