<section class="contact-header section-padding" style="padding-top: 150px;">
  <div class="container text-center">
    <h4 class="gold-text">GET IN TOUCH</h4>
    <h2>Book Your Shoot</h2>
  </div>
</section>

<section class="contact-form-section section-padding">
  <div class="container grid-2">
    <div class="contact-info">
      <h3>Contact Details</h3>
      <p>Feel free to reach out to us for any inquiries or bookings. We are here to help you capture your special moments.</p>
      
      <div class="info-item">
        <i class="fas fa-map-marker-alt"></i>
        <div>
          <h4>Location</h4>
          <p>123 Photography Lane, Patna, Bihar</p>
        </div>
      </div>

      <div class="info-item">
        <i class="fas fa-phone-alt"></i>
        <div>
          <h4>Call Us</h4>
          <p>+91 98765 43210</p>
        </div>
      </div>

      <div class="info-item">
        <i class="fas fa-envelope"></i>
        <div>
          <h4>Email</h4>
          <p>info@momentsstudio.in</p>
        </div>
      </div>
    </div>

    <div class="form-container">
      <form (submit)="onSubmit()">
        <div class="form-group">
          <input type="text" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <input type="text" placeholder="Subject">
        </div>
        <div class="form-group">
          <textarea placeholder="Your Message" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Send Message</button>
      </form>
    </div>
  </div>
</section>
