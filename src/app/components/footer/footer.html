<footer>
  <div class="container footer-grid">
    <div class="footer-info">
      <div class="logo" style="margin-bottom: 20px;">
        <img [src]="'assets/images/logo.svg'" alt="Moments Studio Logo" style="height: 40px;">
      </div>
      <p>{{companyInfo.description}}</p>
      <div class="social-links">
        <a *ngFor="let s of companyInfo.socials" [href]="s.link" target="_blank"><i [class]="s.icon"></i></a>
      </div>
    </div>
    <div class="footer-links">
      <h4>Company</h4>
      <ul>
        <li *ngFor="let link of companyLinks"><a [routerLink]="link.path">{{link.label}}</a></li>
      </ul>
    </div>
    <div class="footer-links">
      <h4>Services</h4>
      <ul>
        <li *ngFor="let link of serviceLinks"><a [routerLink]="link.path">{{link.label}}</a></li>
      </ul>
    </div>
    <div class="footer-contact">
      <h4>Contact Us</h4>
      <p><i class="fas fa-map-marker-alt"></i> {{contactDetails.address}}</p>
      <p><i class="fas fa-envelope"></i> {{contactDetails.email}}</p>
      <p><i class="fas fa-phone"></i> {{contactDetails.phone}}</p>
    </div>
  </div>
  <div class="footer-bottom">
    <div class="container footer-bottom-flex">
      <p>&copy; 2026 Moments Studio. All Rights Reserved.</p>
      <p class="developer-credit">Designed & Developed by <strong>Ritik Raj</strong></p>
    </div>
  </div>
</footer>
